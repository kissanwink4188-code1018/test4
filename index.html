<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>정적 웹페이지</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <h1>정적 웹페이지로 다시 구성했습니다</h1>
      <p>서버 렌더링이나 백엔드 의존 없이, HTML/CSS만으로 바로 배포 가능한 구조입니다.</p>
      <a class="button" href="#features">구성 보기</a>
    </header>

    <main>
      <section id="features" class="card-grid">
        <article class="card">
          <h2>빠른 배포</h2>
          <p>정적 파일만 업로드하면 바로 서비스할 수 있어 운영이 간단합니다.</p>
        </article>
        <article class="card">
          <h2>가벼운 구조</h2>
          <p>불필요한 런타임 의존성을 줄여 로딩 속도와 유지보수성이 좋아집니다.</p>
        </article>
        <article class="card">
          <h2>확장 용이</h2>
          <p>필요하면 JavaScript를 추가해 인터랙션을 점진적으로 확장할 수 있습니다.</p>
        </article>
      </section>
    </main>

    <footer>
      <small>© 2026 Static Web Demo</small>
    </footer>
  </body>
</html>
